<!-- registro.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ProfitLab - Registrarse</title>
  <!-- Importar Montserrat -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
  <!-- Estilos Globales y Específicos para Registro -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/registro.css">
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="header-container">
      <div class="logo">
        <a href="index.html">
          <img src="img/logo.png" alt="ProfitLab Logo">
          <span>ProfitLab</span>
        </a>
      </div>
      <div class="header-links">
        <a href="login.html">Login</a>
        <a href="registro.html">Registrarse</a>
      </div>
    </div>
    <hr class="accent-line">
  </header>

  <!-- SECCIÓN REGISTRO -->
  <section class="section registro-section">
    <div class="form-container">
      <h2>Registrarse</h2>
      <form id="registerForm">
        <!-- Campo: Nombre completo -->
        <div class="form-group">
          <label for="fullName">Nombre completo</label>
          <input type="text" id="fullName" name="fullName" placeholder="Tu nombre completo" required>
        </div>
        <!-- Campo: Correo electrónico -->
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" placeholder="tu@email.com" required>
        </div>
        <!-- Campo: Contraseña -->
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required>
        </div>
        <!-- Campo: Confirmar contraseña -->
        <div class="form-group">
          <label for="confirmPassword">Confirmar contraseña</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repite tu contraseña" required>
        </div>
        <!-- Botón: Crear cuenta -->
        <button type="submit" class="btn">Crear cuenta</button>
      </form>
    </div>
  </section>

  <!-- Script Específico para Registro -->
  <script src="js/registro.js"></script>
</body>
</html>
