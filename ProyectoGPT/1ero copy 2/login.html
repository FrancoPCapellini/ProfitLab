<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ProfitLab - Iniciar sesión</title>
  <!-- Google Fonts: Montserrat -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
  <!-- Hojas de estilos: Global y específicos para Login -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="header-container">
      <div class="logo">
        <a href="index.html">
          <img src="img/logo.png" alt="Logo de ProfitLab">
          <span>ProfitLab</span>
        </a>
      </div>
      <div class="header-links">
        <a href="login.html">Login</a>
        <a href="registro.html">Registrarse</a>
      </div>
    </div>
    <hr class="accent-line">
  </header>

  <main>
    <!-- SECCIÓN LOGIN -->
    <section class="section login-section">
      <div class="form-container">
        <h2>Iniciar sesión</h2>
        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="loginEmail">Correo electrónico</label>
            <input type="email" id="loginEmail" name="loginEmail" placeholder="tu@email">
          </div>
          <div class="form-group">
            <label for="loginPassword">Contraseña</label>
            <input type="password" id="loginPassword" name="loginPassword" placeholder="Tu contraseña">
          </div>
          <button type="submit" class="btn">Ingresar</button>
        </form>
      </div>
    </section>
  </main>

  <!-- JavaScript -->
  <script src="js/main.js"></script>
</body>
</html>
