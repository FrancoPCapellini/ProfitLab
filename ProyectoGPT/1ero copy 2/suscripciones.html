<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ProfitLab - Suscripción</title>
  <!-- Google Fonts: Montserrat -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
  <!-- Hojas de estilos: Global y específicos para Suscripciones -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/suscripciones.css">
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="header-container">
      <div class="logo">
        <a href="index.html">
          <img src="img/logo.png" alt="Logo de ProfitLab">
          <span>ProfitLab</span>
        </a>
      </div>
      <div class="header-links">
        <a href="login.html">Login</a>
        <a href="registro.html">Registrarse</a>
      </div>
    </div>
    <hr class="accent-line">
  </header>

  <main>
    <!-- SECCIÓN SUSCRIPCIONES -->
    <section class="section suscripciones-section">
      <div class="subscription-card">
        <h2>Suscripción</h2>
        <p>Con ProfitLab, accedé a análisis financieros automatizados que optimizan tus inversiones de forma inteligente.</p>
        <div class="form-group">
          <label for="referral">Código de referido</label>
          <input type="text" id="referral" placeholder="Ingresa tu código (opcional)">
        </div>
        <button id="subscribeBtn" class="btn">Suscribite y hacé tu prueba</button>
        <p class="trial-text">14 días para probarlo gratis</p>
      </div>
    </section>
  </main>

  <!-- JavaScript -->
  <script src="js/main.js"></script>
</body>
</html>
